<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Biodata - Akmal Fahreza</title>
<style>

  * { box-sizing: border-box; }

  /* 1. Background color */
  body {
    margin: 0;
    min-height: 100vh;
    padding: 40px 20px;
    background-color: #0f172a;
    background-image: radial-gradient(circle at top left, #1e3a8a 0%, #0f172a 55%);
    display: flex;
    align-items: center;
    justify-content: center;

    /* 2. Font family */
    font-family: 'Poppins', 'Segoe UI', sans-serif;
  }

  .biodata {
    width: 100%;
    max-width: 420px;
    background-color: #ffffff;
    border-radius: 20px;
    padding: 40px 32px;
    box-shadow: 0 25px 50px rgba(0,0,0,0.35);
    text-align: center;
  }

  .avatar {
    width: 96px;
    height: 96px;
    margin: 0 auto 20px;
    border-radius: 50%;
    background: linear-gradient(135deg, #3b82f6, #1d4ed8);
    display: flex;
    align-items: center;
    justify-content: center;
    color: #ffffff;
    font-size: 34px;
    font-weight: 600;
    border: 4px solid #dbeafe;
  }

  /* 5. Warna heading */
  h1 {
    /* 3. Font size */
    font-size: 26px;
    color: #1d4ed8;
    margin: 0 0 4px 0;
    /* 4. Text align */
    text-align: center;
  }

  .subtitle {
    font-size: 13px;
    color: #94a3b8;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin: 0 0 28px 0;
    text-align: center;
  }

  .info-list {
    text-align: left;
    border-top: 1px solid #e5e7eb;
    padding-top: 20px;
  }

  .info-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 0;
    border-bottom: 1px solid #f1f5f9;
    font-size: 15px;
  }

  .info-row:last-child {
    border-bottom: none;
  }

  .label {
    color: #64748b;
    font-weight: 500;
  }

  .value {
    color: #0f172a;
    font-weight: 600;
    text-align: right;
  }

  .badge {
    display: inline-block;
    margin-top: 24px;
    padding: 8px 20px;
    background-color: #eff6ff;
    color: #1d4ed8;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 600;
  }

</style>
</head>
<body>

  <div class="biodata">
    <div class="avatar">AF</div>
    <h1>Akmal Fahreza</h1>
    <p class="subtitle">Kartu Biodata Diri</p>

    <div class="info-list">
      <div class="info-row">
        <span class="label">Kelas</span>
        <span class="value">XII PPLG</span>
      </div>
      <div class="info-row">
        <span class="label">Jurusan</span>
        <span class="value">Pengembangan Perangkat Lunak</span>
      </div>
      <div class="info-row">
        <span class="label">Hobi</span>
        <span class="value">Renang</span>
      </div>
    </div>

   

</body>
</html>
